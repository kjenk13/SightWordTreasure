<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sight Word Treasure Hunt</title>

<style>
* { box-sizing: border-box; }

:root {
  --navy: #12305f;
  --blue: #1976d2;
  --orange: #ff6b00;
  --yellow: #ffd166;
  --purple: #7446c8;
  --green: #23965a;
  --pink: #f05a9d;
  --cream: #fffaf0;
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Arial Rounded MT Bold", "Trebuchet MS", Arial, sans-serif;
  background: radial-gradient(circle at top, #ffffff 0%, #f6fbff 42%, #fff6d5 100%);
  color: var(--navy);
  overscroll-behavior: none;
}

body {
  height: 100dvh;
  overflow: hidden;
}

.app {
  width: min(1180px, 100%);
  height: 100dvh;
  margin: 0 auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.hidden { display: none !important; }

button {
  border: 0;
  border-radius: 14px;
  padding: 8px 11px;
  font-family: inherit;
  font-weight: 900;
  font-size: .82rem;
  cursor: pointer;
  color: var(--navy);
  box-shadow: 0 4px 0 rgba(0,0,0,.14);
  touch-action: manipulation;
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 rgba(0,0,0,.14);
}

.home-btn { background: white; }
.read-btn { background: var(--blue); color: white; }
.parent-btn { background: var(--purple); color: white; }
.gold-btn { background: var(--yellow); }
.green-btn { background: #b7e4c7; }
.pink-btn { background: #ffc8dd; }
.gray-btn { background: #e9ecef; }

.top-ui {
  background: rgba(255,255,255,.97);
  border-radius: 16px;
  padding: 6px 8px;
  display: grid;
  grid-template-columns: auto auto 1fr auto auto;
  gap: 8px;
  align-items: center;
  box-shadow: 0 7px 16px rgba(0,0,0,.12);
  margin-bottom: 4px;
  flex: 0 0 auto;
}

.home-btn,
.read-btn,
.parent-btn {
  min-height: 42px;
}

.title {
  text-align: center;
  line-height: 1;
}

.title .small {
  font-size: clamp(.95rem, 2vw, 1.35rem);
  color: var(--navy);
  font-weight: 900;
}

.title .big {
  font-size: clamp(1.25rem, 3.1vw, 2.15rem);
  color: var(--orange);
  font-weight: 900;
  text-shadow: 0 2px 0 rgba(255,167,38,.22);
}

.coin-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .82rem;
  line-height: 1.1;
  min-width: 118px;
  font-weight: 900;
}

.coin-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff3b0, #f4b942);
  border: 3px solid #d99a00;
  display: grid;
  place-items: center;
  font-size: 1.15rem;
  flex: 0 0 auto;
}

.coin-count {
  font-size: 1.1rem;
  color: var(--green);
}

.card {
  background: rgba(255,255,255,.95);
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 8px 18px rgba(0,0,0,.10);
}

.home-screen,
.parent-screen {
  flex: 1 1 auto;
  overflow: auto;
}

.home-screen h2,
.parent-screen h2 {
  margin-top: 0;
  color: var(--blue);
}

.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
  gap: 14px;
}

.level-card {
  background: #eef8ff;
  border: 4px solid #90dbf4;
  border-radius: 20px;
  padding: 12px;
  text-align: center;
}

.level-card.locked {
  opacity: .45;
  filter: grayscale(1);
}

.level-card h3 {
  margin: 0 0 8px;
}

#gameScreen:not(.hidden) {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 4px;
}

.compact-progress-card {
  padding: 5px 8px;
  border-radius: 14px;
}

.progress-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

.progress-word {
  background: white;
  border: 2px solid #f0dfad;
  border-radius: 12px;
  padding: 4px 5px;
  font-weight: 900;
  font-size: clamp(.76rem, 1.55vw, .95rem);
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.progress-word:nth-child(1) { color: #1565c0; border-color: #1565c0; }
.progress-word:nth-child(2) { color: #7446c8; border-color: #7446c8; }
.progress-word:nth-child(3) { color: #23965a; border-color: #23965a; }
.progress-word:nth-child(4) { color: #ff6b00; border-color: #ff9f1c; }
.progress-word:nth-child(5) { color: #f05a9d; border-color: #f05a9d; }

.stars {
  color: #f6b800;
  font-size: clamp(.72rem, 1.45vw, .9rem);
  letter-spacing: 0;
  white-space: nowrap;
}

.scene-area {
  position: relative;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  border: 5px solid var(--yellow);
  border-radius: 18px;
  background: #bdefff;
  box-shadow: 0 8px 18px rgba(0,0,0,.14);
}

.scene-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
}

.layer-object {
  position: absolute;
  z-index: 5;
  transform: translate(-50%, -50%);
  font-size: clamp(1.8rem, 4vw, 3.4rem);
  pointer-events: none;
  filter: drop-shadow(0 4px 3px rgba(0,0,0,.18));
  transition: opacity .2s ease, transform .2s ease;
}

.layer-object.found {
  opacity: 0;
  transform: translate(-50%, -50%) scale(.75);
}

.hotspot {
  position: absolute;
  background: rgba(255,255,255,0);
  box-shadow: none;
  border-radius: 50%;
  padding: 0;
  z-index: 8;
}

.hotspot:active {
  transform: none;
  box-shadow: none;
}

.search-marker {
  position: absolute;
  z-index: 7;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 1.2rem;
  background: rgba(255,255,255,.82);
  border: 3px solid rgba(255,209,102,.96);
  box-shadow: 0 0 14px rgba(255,209,102,.96);
  pointer-events: none;
  animation: markerPulse 1.25s infinite ease-in-out;
}

@keyframes markerPulse {
  0%, 100% { transform: scale(.95); }
  50% { transform: scale(1.16); }
}

.coin-pop {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 20;
  width: min(170px, 30%);
  background: rgba(255,255,255,.97);
  border-radius: 16px;
  padding: 7px;
  box-shadow: 0 10px 22px rgba(0,0,0,.22);
  text-align: center;
}

.big-coin {
  width: 86px;
  height: 86px;
  border-radius: 50%;
  margin: 0 auto;
  background: radial-gradient(circle at 30% 25%, #fff8c8 0%, #ffd44f 38%, #e6a800 100%);
  border: 5px solid #d99a00;
  box-shadow: inset -6px -8px 0 rgba(0,0,0,.08), 0 6px 12px rgba(0,0,0,.16);
  display: grid;
  place-items: center;
  color: #6b3e00;
  font-size: clamp(1.25rem, 3vw, 1.85rem);
  font-weight: 900;
  text-transform: lowercase;
}

.sparkle {
  position: absolute;
  z-index: 12;
  font-size: 2.3rem;
  pointer-events: none;
  animation: sparklePop .8s forwards;
}

@keyframes sparklePop {
  0% { transform: scale(.4); opacity: 0; }
  25% { transform: scale(1.25); opacity: 1; }
  100% { transform: scale(.8); opacity: 0; }
}

.sort-area {
  background: rgba(255,250,240,.98);
  border-radius: 16px;
  padding: 5px 8px 7px;
  box-shadow: 0 7px 16px rgba(0,0,0,.10);
  flex: 0 0 auto;
}

.chests {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
}

.chest {
  position: relative;
  min-height: 62px;
  border-radius: 13px 13px 10px 10px;
  border: 3px solid #d99a00;
  background: linear-gradient(#1e88e5 0 22%, #1565c0 22% 42%, #1e88e5 42% 62%, #1565c0 62% 82%, #1e88e5 82%);
  display: flex;
  align-items: end;
  justify-content: center;
  padding-bottom: 4px;
}

.chest:nth-child(2) {
  background: linear-gradient(#8e5ce6 0 22%, #6f42c1 22% 42%, #8e5ce6 42% 62%, #6f42c1 62% 82%, #8e5ce6 82%);
}

.chest:nth-child(3) {
  background: linear-gradient(#24b8aa 0 22%, #118f86 22% 42%, #24b8aa 42% 62%, #118f86 62% 82%, #24b8aa 82%);
}

.chest:nth-child(4) {
  background: linear-gradient(#ff9f1c 0 22%, #e87900 22% 42%, #ff9f1c 42% 62%, #e87900 62% 82%, #ff9f1c 82%);
}

.chest:nth-child(5) {
  background: linear-gradient(#ff5ca8 0 22%, #d93d87 22% 42%, #ff5ca8 42% 62%, #d93d87 62% 82%, #ff5ca8 82%);
}

.chest::before {
  content: "";
  position: absolute;
  top: -8px;
  left: 10%;
  width: 80%;
  height: 20px;
  border-radius: 20px 20px 7px 7px;
  background: inherit;
  border: 3px solid #d99a00;
}

.chest::after {
  content: "🔒";
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--yellow);
  color: #6b3e00;
  border: 2px solid #d99a00;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  font-size: .7rem;
}

.chest-label {
  background: #fff8dc;
  color: var(--navy);
  border: 2px solid #d99a00;
  border-radius: 8px;
  min-width: 46px;
  padding: 3px 6px;
  z-index: 3;
  font-size: clamp(.75rem, 1.5vw, .95rem);
  font-weight: 900;
}

.chest.shake {
  animation: shake .35s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-8px); }
  100% { transform: translateX(0); }
}

.parent-screen input,
.parent-screen textarea {
  width: 100%;
  border-radius: 16px;
  border: 3px solid #b7e4c7;
  padding: 12px;
  font-size: 1rem;
  font-family: inherit;
  margin-bottom: 10px;
}

.parent-screen textarea { min-height: 80px; }

@media (max-width: 780px) {
  .top-ui {
    grid-template-columns: auto auto 1fr auto auto;
    gap: 5px;
  }

  .home-btn,
  .read-btn,
  .parent-btn {
    padding: 7px 8px;
    font-size: .75rem;
  }

  .coin-badge {
    min-width: 92px;
    font-size: .72rem;
  }

  .coin-icon {
    width: 30px;
    height: 30px;
    font-size: 1rem;
  }

  .title .small {
    font-size: .95rem;
  }

  .title .big {
    font-size: 1.45rem;
  }
}

@media (max-width: 560px) {
  body { overflow: auto; height: auto; }
  .app { height: auto; overflow: visible; }
  #gameScreen:not(.hidden) { display: block; }
  .scene-area { height: auto; }
  .scene-img { height: auto; object-fit: contain; }
}
</style>
</head>

<body>
<div class="app">

  <header class="top-ui">
    <button class="home-btn" onclick="showHome()">🏠<br>Home</button>

    <div class="coin-badge">
      <div class="coin-icon">🪙</div>
      <div>
        <div id="currentLevelName">Choose Level</div>
        <div><span id="levelCoins" class="coin-count">0</span> / 15</div>
      </div>
    </div>

    <div class="title">
      <div class="small">Sight Word</div>
      <div class="big">Treasure Hunt</div>
    </div>

    <button class="read-btn" onclick="readActiveWord()">🔊 Read Word</button>
    <button class="parent-btn" onclick="showParent()">⚙️ Parent Portal</button>
  </header>

  <main id="homeScreen" class="card home-screen">
    <h2>Choose a Level</h2>
    <p>Each level has 5 words. Each word is practiced 3 times.</p>
    <div id="levelGrid" class="level-grid"></div>
  </main>

  <main id="gameScreen" class="hidden">
    <section class="card compact-progress-card" style="display:none">
      <div id="progressGrid" class="progress-grid"></div>
    </section>

    <section class="scene-area" id="sceneArea">
      <img src="beach-scene.png" class="scene-img" alt="Beach hidden object scene">
      <div id="objectLayer"></div>
      <div id="hotspots"></div>

      <div id="coinPop" class="coin-pop hidden">
        <div id="coinText" class="big-coin"></div>
      </div>
    </section>

    <section id="sortArea" class="sort-area">
      <div id="chests" class="chests"></div><div id="chestProgress" class="progress-grid" style="margin-top:6px"></div>
    </section>
  </main>

  <main id="parentScreen" class="card parent-screen hidden">
    <h2>Parent Portal</h2>
    <p>Edit levels or add new ones. Use exactly 5 words per level.</p>
    <div id="parentLevels"></div>

    <h3>Add New Level</h3>
    <input id="newLevelName" placeholder="Level name">
    <textarea id="newLevelWords" placeholder="word1, word2, word3, word4, word5"></textarea>
    <button class="green-btn" onclick="addLevel()">Add Level</button>

    <hr>
    <button class="pink-btn" onclick="resetProgress()">Reset Progress</button>
    <button class="gray-btn" onclick="restoreDefaults()">Restore Default Levels</button>
  </main>

</div>

<script>
const STORAGE_KEY = "sightWordTreasureHuntFinalV2";

const defaultLevels = [
  { name: "Level 1 — First Words", words: ["me", "he", "do", "go", "no"] },
  { name: "Level 2 — Early Sight Words", words: ["my", "can", "you", "we", "see"] },
  { name: "Level 3 — -at Family", words: ["cat", "bat", "sat", "mat", "hat"] },
  { name: "Level 4 — -an Family", words: ["can", "man", "ran", "fan", "pan"] },
  { name: "Level 5 — Short i Words", words: ["it", "bit", "fit", "hit", "did"] },
  { name: "Level 6 — -ig / -in Words", words: ["big", "pig", "dig", "wig", "fin"] },
  { name: "Level 7 — More Short i", words: ["pin", "fin", "win", "tin", "get"] },
  { name: "Level 8 — -og / -ox Words", words: ["dog", "fog", "fox", "box", "mob"] },
  { name: "Level 9 — -op / -ot Words", words: ["hop", "top", "mop", "pop", "pot"] },
  { name: "Level 10 — Mixed Short O", words: ["hot", "not", "dot", "cot", "rob"] },
  { name: "Level 11 — Core Sight Words", words: ["the", "and", "for", "was", "are"] },
  { name: "Level 12 — Bigger Sight Words", words: ["is", "all", "look", "like", "have"] },
  { name: "Level 13 — Advanced Sight Words", words: ["some", "with", "one", "this", "that"] },
  { name: "Level 14 — Boss Level", words: ["them", "they", "then", "there", "what"] }
];

// Percent-based hotspot positions on the beach image.
// These match removable layered objects that disappear after each coin is sorted.
const hotspotPositions = [
  { x: 8, y: 45, w: 8, h: 14, icon: "🪣" },
  { x: 20, y: 52, w: 8, h: 12, icon: "🐚" },
  { x: 31, y: 41, w: 8, h: 13, icon: "🪨" },
  { x: 40, y: 45, w: 8, h: 13, icon: "⭐" },
  { x: 52, y: 52, w: 8, h: 13, icon: "🦀" },
  { x: 66, y: 48, w: 8, h: 13, icon: "🏖️" },
  { x: 85, y: 38, w: 8, h: 14, icon: "🌴" },
  { x: 90, y: 64, w: 8, h: 13, icon: "🪨" },
  { x: 74, y: 67, w: 8, h: 13, icon: "🧺" },
  { x: 60, y: 76, w: 8, h: 13, icon: "🩴" },
  { x: 45, y: 71, w: 8, h: 13, icon: "🐚" },
  { x: 33, y: 74, w: 8, h: 13, icon: "🏰" },
  { x: 20, y: 79, w: 8, h: 13, icon: "⚓" },
  { x: 5, y: 72, w: 8, h: 13, icon: "🐢" },
  { x: 92, y: 76, w: 7, h: 12, icon: "🌺" }
];

let state = loadState();
let currentLevelIndex = 0;
let currentCoins = [];
let levelProgress = {};
let activeCoin = null;

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) return JSON.parse(saved);

  return {
    levels: defaultLevels,
    unlockedLevel: 0,
    completedLevels: [],
    totalCoins: 0
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function showHome() {
  document.getElementById("homeScreen").classList.remove("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("parentScreen").classList.add("hidden");
  activeCoin = null;
  renderHome();
  updateCoinHeader();
}

function showParent() {
  const code = prompt("Enter Parent Code");
  if (code !== "0000") {
    alert("Incorrect code");
    return;
  }
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("parentScreen").classList.remove("hidden");
  renderParent();
}

function renderHome() {
  const grid = document.getElementById("levelGrid");
  grid.innerHTML = "";

  state.levels.forEach((level, index) => {
    const locked = index > state.unlockedLevel;
    const completed = state.completedLevels.includes(index);

    const div = document.createElement("div");
    div.className = "level-card" + (locked ? " locked" : "");
    div.innerHTML = `
      <h3>${completed ? "⭐ " : ""}${escapeHTML(level.name)}</h3>
      <p>${escapeHTML(level.words.join(", "))}</p>
      <button class="${locked ? "gray-btn" : "gold-btn"}" ${locked ? "disabled" : ""}>
        ${locked ? "Locked" : "Play"}
      </button>
    `;

    div.querySelector("button").onclick = () => {
      if (!locked) startLevel(index);
    };

    grid.appendChild(div);
  });
}

function startLevel(index) {
  currentLevelIndex = index;
  const level = state.levels[index];

  currentCoins = [];
  levelProgress = {};
  level.words.forEach(word => {
    levelProgress[word] = 0;
    for (let i = 0; i < 3; i++) {
      currentCoins.push({ word, sorted: false });
    }
  });

  currentCoins = shuffle(currentCoins);
  activeCoin = null;

  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("parentScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  document.getElementById("coinPop").classList.add("hidden");

  renderGame();
}

function renderGame() {
  renderProgress();
  renderChestProgress();
  renderObjects();
  renderHotspots();
  renderChests();
  updateCoinHeader();
}


function renderChestProgress() {
  const grid = document.getElementById("chestProgress");
  if (!grid) return;
  grid.innerHTML = "";

  state.levels[currentLevelIndex].words.forEach(word => {
    const count = levelProgress[word] || 0;
    const div = document.createElement("div");
    div.className = "progress-word";
    div.innerHTML = '<span class="stars">' + ("★".repeat(count) + "☆".repeat(3-count)) + '</span>';
    grid.appendChild(div);
  });
}

function renderProgress() {
  const grid = document.getElementById("progressGrid");
  grid.innerHTML = "";

  state.levels[currentLevelIndex].words.forEach(word => {
    const count = levelProgress[word] || 0;
    const stars = "★".repeat(count) + "☆".repeat(3 - count);

    const div = document.createElement("div");
    div.className = "progress-word";
    div.innerHTML = `${escapeHTML(word)}<span class="stars">${stars}</span>`;
    grid.appendChild(div);
  });
}

function renderObjects() {
  const layer = document.getElementById("objectLayer");
  layer.innerHTML = "";

  currentCoins.forEach((coin, index) => {
    if (coin.sorted) return;

    const pos = hotspotPositions[index];
    const obj = document.createElement("div");
    obj.className = "layer-object";
    obj.textContent = pos.icon;
    obj.style.left = (pos.x + pos.w / 2) + "%";
    obj.style.top = (pos.y + pos.h / 2) + "%";
    layer.appendChild(obj);
  });
}

function renderHotspots() {
  const container = document.getElementById("hotspots");
  container.innerHTML = "";

  currentCoins.forEach((coin, index) => {
    if (coin.sorted) return;

    const pos = hotspotPositions[index];

    const marker = document.createElement("div");
    marker.className = "search-marker";
    marker.textContent = "✨";
    marker.style.left = `calc(${pos.x + pos.w / 2}% - 14px)`;
    marker.style.top = `calc(${pos.y + pos.h / 2}% - 14px)`;
    container.appendChild(marker);

    const btn = document.createElement("button");
    btn.className = "hotspot";
    btn.style.left = pos.x + "%";
    btn.style.top = pos.y + "%";
    btn.style.width = pos.w + "%";
    btn.style.height = pos.h + "%";
    btn.setAttribute("aria-label", "Search sparkling beach object");
    btn.onclick = () => revealCoin(index);
    container.appendChild(btn);
  });
}

function revealCoin(index) {
  const coin = currentCoins[index];
  if (!coin || coin.sorted) return;

  activeCoin = { word: coin.word, index };

  document.getElementById("coinText").textContent = coin.word;
  document.getElementById("coinPop").classList.remove("hidden");

  speak(coin.word);
}

function renderChests() {
  const chests = document.getElementById("chests");
  chests.innerHTML = "";

  state.levels[currentLevelIndex].words.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "chest";
    btn.innerHTML = `<span class="chest-label">${escapeHTML(choice)}</span>`;
    btn.onclick = () => {
      speak(choice);

      if (!activeCoin) return;

      setTimeout(() => {
        if (choice === activeCoin.word) correctSort();
        else wrongSort(btn);
      }, 250);
    };
    chests.appendChild(btn);
  });
}

function correctSort() {
  const coin = currentCoins[activeCoin.index];
  coin.sorted = true;
  levelProgress[coin.word]++;
  state.totalCoins++;

  showSparkle(activeCoin.index);

  activeCoin = null;
  document.getElementById("coinPop").classList.add("hidden");

  renderProgress();
  renderChestProgress();
  renderObjects();
  renderHotspots();
  updateCoinHeader();
  saveState();
  checkLevelComplete();
}

function wrongSort(btn) {
  btn.classList.add("shake");
  setTimeout(() => btn.classList.remove("shake"), 400);
}

function checkLevelComplete() {
  if (!currentCoins.every(c => c.sorted)) return;

  if (!state.completedLevels.includes(currentLevelIndex)) {
    state.completedLevels.push(currentLevelIndex);
  }

  if (currentLevelIndex === state.unlockedLevel && state.unlockedLevel < state.levels.length - 1) {
    state.unlockedLevel++;
  }

  saveState();

  setTimeout(() => {
    alert("🎉 Treasure Found! You completed the level!");
    showHome();
  }, 500);
}

function updateCoinHeader() {
  const found = currentCoins.length ? currentCoins.filter(c => c.sorted).length : 0;
  document.getElementById("levelCoins").textContent = found;

  const levelName = state.levels[currentLevelIndex]?.name || "Choose Level";
  const shortName = levelName.replace(/^Level\s*\d+\s*[—-]\s*/i, "");
  const levelNameEl = document.getElementById("currentLevelName");
  if (levelNameEl) levelNameEl.textContent = shortName;
}

function showSparkle(index) {
  const scene = document.getElementById("sceneArea");
  const pos = hotspotPositions[index];

  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.textContent = "✨";
  sparkle.style.left = (pos.x + pos.w / 2) + "%";
  sparkle.style.top = (pos.y + pos.h / 2) + "%";

  scene.appendChild(sparkle);
  setTimeout(() => sparkle.remove(), 850);
}

function readActiveWord() {
  if (activeCoin) speak(activeCoin.word);
}

function speak(text) {
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.75;
  utterance.pitch = 1;
  window.speechSynthesis.speak(utterance);
}

function renderParent() {
  const container = document.getElementById("parentLevels");
  container.innerHTML = "";

  state.levels.forEach((level, index) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${escapeHTML(level.name)}</h3>
      <input id="name-${index}" value="${escapeHTML(level.name)}">
      <textarea id="words-${index}">${escapeHTML(level.words.join(", "))}</textarea>
      <button class="read-btn" onclick="saveLevel(${index})">Save Level</button>
    `;
    container.appendChild(div);
  });
}

function saveLevel(index) {
  const name = document.getElementById(`name-${index}`).value.trim();
  const words = document.getElementById(`words-${index}`).value
    .split(",")
    .map(w => w.trim().toLowerCase())
    .filter(Boolean)
    .slice(0, 5);

  if (words.length !== 5) {
    alert("Please use exactly 5 words.");
    return;
  }

  state.levels[index].name = name || `Level ${index + 1}`;
  state.levels[index].words = words;
  saveState();
  alert("Level saved!");
  renderParent();
}

function addLevel() {
  const name = document.getElementById("newLevelName").value.trim() || `Level ${state.levels.length + 1}`;
  const words = document.getElementById("newLevelWords").value
    .split(",")
    .map(w => w.trim().toLowerCase())
    .filter(Boolean)
    .slice(0, 5);

  if (words.length !== 5) {
    alert("Please enter exactly 5 words.");
    return;
  }

  state.levels.push({ name, words });
  saveState();

  document.getElementById("newLevelName").value = "";
  document.getElementById("newLevelWords").value = "";

  alert("New level added!");
  renderParent();
}

function resetProgress() {
  if (!confirm("Reset coins, completed levels, and unlocked levels?")) return;
  state.unlockedLevel = 0;
  state.completedLevels = [];
  state.totalCoins = 0;
  saveState();
  alert("Progress reset.");
  renderParent();
}

function restoreDefaults() {
  if (!confirm("Restore default levels? This will remove custom levels.")) return;
  state = {
    levels: defaultLevels,
    unlockedLevel: 0,
    completedLevels: [],
    totalCoins: 0
  };
  saveState();
  alert("Default levels restored.");
  renderParent();
}

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function escapeHTML(text) {
  return String(text).replace(/[&<>"']/g, m => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[m]));
}

showHome();
</script>
</body>
</html>
